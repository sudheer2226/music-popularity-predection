<!DOCTYPE html>
<html>
<head>
    <title>Music Popularity Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🎵 Music Popularity Prediction</h1>

    <form action="/predict" method="post">

       <input name="danceability" placeholder="Danceability">
       <input name="energy" placeholder="Energy">
       <input name="tempo" placeholder="Tempo">
       <input name="loudness" placeholder="Loudness">

        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}
</div>

</body>
</html>
